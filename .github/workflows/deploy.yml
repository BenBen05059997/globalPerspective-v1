name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'global-perspectives-starter/frontend/src/**'
      - 'global-perspectives-starter/frontend/package.json'
      - 'global-perspectives-starter/frontend/vite.config.*'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: global-perspectives-starter/frontend/package-lock.json

      - name: Install dependencies
        working-directory: global-perspectives-starter/frontend
        run: npm ci

      - name: Build
        working-directory: global-perspectives-starter/frontend
        run: npm run build

      - name: Copy to docs/
        run: |
          rm -rf docs/assets
          cp -r global-perspectives-starter/frontend/dist/assets docs/assets
          cp global-perspectives-starter/frontend/dist/index.html docs/index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets docs/index.html
          git diff --staged --quiet || git commit -m "Auto-deploy: build frontend [skip ci]"
          git push
