        <h1>Global Perspectives™ — AI-Powered News Intelligence</h1>
        <p>Global Perspectives is an AI news aggregator and geopolitical intelligence platform that goes beyond headlines. We track how global stories evolve over days and weeks, analyze country-level risk signals across 190+ countries, and surface narrative patterns that traditional news tools miss.</p>

        <ul>
          <li><strong>AI News Aggregation</strong> — Collect, categorize, and analyze news from thousands of sources with machine learning</li>
          <li><strong>Country Risk Analysis</strong> — Automated political, economic, and social risk assessment across 190+ countries</li>
          <li><strong>Narrative Thread Intelligence</strong> — Track how stories evolve across days with AI-generated story arcs, trajectory predictions, and root cause chains</li>
          <li><strong>Interactive World Map</strong> — Visualize geopolitical news connections with geographic markers and cross-country story links</li>
          <li><strong>AI Summaries, Predictions &amp; Root Cause Analysis</strong> — Get deeper context on every topic, not just headlines</li>

        <h2>Who uses Global Perspectives?</h2>
        <p>Business analysts, geopolitical researchers, journalists, risk managers, and professionals who need to track global events and understand how narratives evolve across countries and time.</p>
