name: verify-economic

on:
  push:
    branches: [main]
    paths:
      - 'amplify/backend/function/newsEconomicImpact/**'
      - 'amplify/backend/function/newsEconomicQuality/**'
      - 'global-perspectives-starter/frontend/src/hooks/useEconomicImpact.js'
      - 'global-perspectives-starter/frontend/src/hooks/useDisruptionsList.js'
      - 'global-perspectives-starter/frontend/src/hooks/useTopMovers.js'
      - 'global-perspectives-starter/frontend/src/components/atoms/SeverityBadge.jsx'
      - 'global-perspectives-starter/frontend/src/components/atoms/MechanismCard.jsx'
      - 'global-perspectives-starter/frontend/src/components/atoms/DisruptionRow.jsx'
      - 'global-perspectives-starter/frontend/src/components/atoms/DisruptionPreview.jsx'
      - 'global-perspectives-starter/frontend/src/components/atoms/QualityFlag.jsx'
      - 'global-perspectives-starter/frontend/src/components/EconomyPage.jsx'
      - 'global-perspectives-starter/frontend/src/components/Home.jsx'
      - 'global-perspectives-starter/frontend/src/components/DailyPage.jsx'
      - 'global-perspectives-starter/frontend/src/components/ThreadPage.jsx'
      - 'global-perspectives-starter/frontend/src/components/CountryPage.jsx'
      - 'global-perspectives-starter/frontend/src/components/CountryListPage.jsx'
      - 'global-perspectives-starter/frontend/src/components/WorldMapV2.jsx'
      - 'global-perspectives-starter/frontend/src/components/WeeklyPage.jsx'
      - 'global-perspectives-starter/frontend/src/components/Layout.jsx'
      - 'global-perspectives-starter/frontend/src/components/Disclosures.jsx'
      - 'quality/**'
  pull_request:
    branches: [main]

jobs:
  fast-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: global-perspectives-starter/frontend
        run: npm ci --no-audit --no-fund

      - name: Install Lambda producer deps
        working-directory: amplify/backend/function/newsEconomicImpact/src
        run: npm install --omit=dev --no-audit --no-fund

      - name: Install Lambda judge deps
        working-directory: amplify/backend/function/newsEconomicQuality/src
        run: npm install --omit=dev --no-audit --no-fund

      - name: Run verify_all.sh --fast (L2 + L3 + L5/L6 + L7)
        run: bash quality/verify_all.sh --fast
